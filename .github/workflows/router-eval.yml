name: router-eval

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  eval-router:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run router regression eval
        run: python3 scripts/eval_router.py --fail-on-error --format text --output reports/router-eval.json --output-format json

      - name: Upload router eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: router-eval-report
          path: reports/router-eval.json
